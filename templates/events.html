<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShipsAhoy — Events</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 2em auto; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.4em 0.8em; text-align: left; }
    th { background: #eee; }
    tr:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <a href="/">← Back</a>
  <h1>Recent Events</h1>

  {% if events %}
  <table>
    <tr>
      <th>Time</th>
      <th>Ship</th>
      <th>Event</th>
      <th>Detail</th>
      <th>Displayed</th>
    </tr>
    {% for event in events %}
    <tr>
      <td>{{ event.created_at }}</td>
      <td><a href="/ship/{{ event.mmsi }}">{{ event.ship_name }}</a></td>
      <td>{{ event.event_type }}</td>
      <td>{{ event.detail }}</td>
      <td>{{ '✓' if event.displayed_at else '—' }}</td>
    </tr>
    {% endfor %}
  </table>
  {% else %}
    <p>No events recorded yet.</p>
  {% endif %}
</body>
</html>
